{% extends "base.html" %}
{% block content %}
<form id="expense-form"
      hx-post="/submit"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      enctype="multipart/form-data">

  <div class="grid">

    <label class="full">
      <span>Công ty <em>*</em></span>
      <select name="company_id" required>
        <option value="">-- Chọn công ty --</option>
        {% for c in dropdowns.companies %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Nhân viên <em>*</em></span>
      <select name="employee_id" id="employee-id" required>
        <option value="">-- Chọn nhân viên --</option>
        {% for e in dropdowns.employees %}
          <option value="{{ e.id }}" data-company-id="{{ e.company_id[0] if e.company_id else '' }}">
            {{ e.name }}{% if e.company_id %} ({{ e.company_id[1] }}){% endif %}
          </option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Hạng mục <em>*</em></span>
      <select name="product_id" required>
        <option value="">-- Chọn hạng mục --</option>
        {% for p in dropdowns.categories %}
          <option value="{{ p.id }}">
            {{ p.default_code or '—' }} · {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </label>

    <label>
      <span>Ngày <em>*</em></span>
      <input type="date" name="date" required value="{{ today }}">
    </label>

    {% if dropdowns.currencies|length > 1 %}
      <label>
        <span>Tiền tệ <em>*</em></span>
        <select name="currency_id" required>
          {% for cur in dropdowns.currencies %}
            <option value="{{ cur.id }}">{{ cur.name }} ({{ cur.symbol }})</option>
          {% endfor %}
        </select>
      </label>
    {% else %}
      <div class="placeholder-cell"></div>
    {% endif %}

    <label class="full">
      <span>
        Số tiền <em>*</em>
        {% if dropdowns.currencies|length == 1 %}
          <small class="currency-suffix-inline">({{ dropdowns.currencies[0].name }} {{ dropdowns.currencies[0].symbol }})</small>
        {% endif %}
      </span>
      <input type="number" name="total_amount" step="0.01" min="0.01" required placeholder="0.00">
    </label>

    {% if dropdowns.currencies|length == 1 %}
      <input type="hidden" name="currency_id" value="{{ dropdowns.currencies[0].id }}">
    {% endif %}

    <label class="full">
      <span>Người chi trả <em>*</em></span>
      <select name="payment_mode" id="payment-mode" required>
        <option value="own_account" selected>Nhân viên (công ty sẽ hoàn lại)</option>
        <option value="company_account">Công ty chi trả</option>
      </select>
    </label>

    <label class="full" id="vendor-wrap" style="display: none;">
      <span>Nhà cung cấp <em>*</em> <small>(bắt buộc khi Công ty chi trả)</small></span>
      <select name="vendor_id" id="vendor-id">
        <option value="">-- Chọn nhà cung cấp --</option>
        {% for v in dropdowns.vendors %}
          <option value="{{ v.id }}" data-company-id="{{ v.company_id[0] if v.company_id else '' }}">{{ v.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Ghi chú <small>(nội bộ)</small></span>
      <textarea name="description" rows="2" placeholder="vd: Phí ship Lalamove đơn #XYZ"></textarea>
    </label>

    <div class="full upload-container">
      <span class="upload-label">Hóa đơn <small>(PDF / ảnh, tối đa 16MB/file, chọn được nhiều file)</small></span>
      <div class="upload-zone" id="upload-zone">
        <input type="file" name="receipts" accept="image/*,application/pdf" id="receipts-input" multiple style="display: none;">
        <div class="upload-zone-content">
          <svg class="upload-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <span class="upload-prompt">Kéo thả file vào đây hoặc <strong>bấm để chọn</strong></span>
        </div>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>

  </div>

  <div class="actions">
    <button type="submit" class="primary">Gửi chi phí</button>
    <span class="htmx-indicator" id="loading">Đang gửi...</span>
  </div>
</form>

<div id="result"></div>

<script>
  // Show vendor field only when payment_mode = company_account
  const pm = document.getElementById('payment-mode');
  const vw = document.getElementById('vendor-wrap');
  const vi = document.getElementById('vendor-id');
  function syncVendor() {
    if (pm.value === 'company_account') {
      vw.style.display = '';
      vi.required = true;
    } else {
      vw.style.display = 'none';
      vi.required = false;
      vi.value = '';
    }
  }
  pm.addEventListener('change', syncVendor);
  syncVendor();

  // Dynamically filter Employee and Vendor options based on the selected Company
  const companySelect = document.querySelector('select[name="company_id"]');
  const employeeSelect = document.getElementById('employee-id');
  const vendorSelect = document.getElementById('vendor-id');

  const employeePlaceholder = employeeSelect.options[0].cloneNode(true);
  const vendorPlaceholder = vendorSelect.options[0].cloneNode(true);

  // Keep master copies of the options (skipping placeholder)
  const masterEmployees = Array.from(employeeSelect.options).slice(1);
  const masterVendors = Array.from(vendorSelect.options).slice(1);

  function filterSelect(selectEl, placeholder, masterOptions, selectedCompanyId) {
    const currentValue = selectEl.value;
    selectEl.innerHTML = '';
    selectEl.appendChild(placeholder.cloneNode(true));

    let hasCurrentValue = false;
    masterOptions.forEach(opt => {
      const optCompanyId = opt.getAttribute('data-company-id');
      // Show if no company is selected, or if the option is shared, or if it matches the selected company
      if (!selectedCompanyId || !optCompanyId || optCompanyId === selectedCompanyId) {
        const cloned = opt.cloneNode(true);
        selectEl.appendChild(cloned);
        if (cloned.value === currentValue) {
          hasCurrentValue = true;
        }
      }
    });

    if (hasCurrentValue) {
      selectEl.value = currentValue;
    } else {
      selectEl.value = '';
    }
  }

  function syncCompanyFilters() {
    const selectedCompanyId = companySelect.value;
    filterSelect(employeeSelect, employeePlaceholder, masterEmployees, selectedCompanyId);
    filterSelect(vendorSelect, vendorPlaceholder, masterVendors, selectedCompanyId);
  }

  companySelect.addEventListener('change', syncCompanyFilters);
  syncCompanyFilters();

  // Multi-File Upload JavaScript Handler
  const uploadZone = document.getElementById('upload-zone');
  const receiptsInput = document.getElementById('receipts-input');
  const fileList = document.getElementById('file-list');
  let selectedFiles = [];

  // Trigger file dialog on click
  uploadZone.addEventListener('click', () => {
    receiptsInput.click();
  });

  // Handle Drag & Drop events
  ['dragenter', 'dragover'].forEach(eventName => {
    uploadZone.addEventListener(eventName, (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    }, false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    uploadZone.addEventListener(eventName, (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
    }, false);
  });

  uploadZone.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const files = Array.from(dt.files);
    addFiles(files);
  });

  // Handle manual file selection
  receiptsInput.addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    addFiles(files);
  });

  function addFiles(files) {
    const validFiles = files.filter(file => {
      const isImgOrPdf = file.type.startsWith('image/') || file.type === 'application/pdf';
      const isUnderLimit = file.size <= 16 * 1024 * 1024;
      if (!isImgOrPdf) alert(`File ${file.name} không được hỗ trợ (chỉ nhận ảnh hoặc PDF)`);
      if (!isUnderLimit) alert(`File ${file.name} vượt quá dung lượng 16MB cho phép`);
      return isImgOrPdf && isUnderLimit;
    });

    selectedFiles = [...selectedFiles, ...validFiles];
    updateFileInput();
    renderFileList();
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    updateFileInput();
    renderFileList();
  }

  function updateFileInput() {
    const dt = new DataTransfer();
    selectedFiles.forEach(file => dt.items.add(file));
    receiptsInput.files = dt.files;
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
  }

  function renderFileList() {
    fileList.innerHTML = '';
    
    selectedFiles.forEach((file, index) => {
      const fileItem = document.createElement('div');
      fileItem.className = 'file-item';

      const fileInfo = document.createElement('div');
      fileInfo.className = 'file-info';

      // Create preview or icon
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.className = 'file-preview';
        img.src = URL.createObjectURL(file);
        img.onload = () => URL.revokeObjectURL(img.src);
        fileInfo.appendChild(img);
      } else {
        // PDF Icon
        const iconDiv = document.createElement('div');
        iconDiv.className = 'file-icon-placeholder';
        iconDiv.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        `;
        fileInfo.appendChild(iconDiv);
      }

      const fileMeta = document.createElement('div');
      fileMeta.className = 'file-meta';
      
      const fileName = document.createElement('span');
      fileName.className = 'file-name-text';
      fileName.textContent = file.name;
      
      const fileSize = document.createElement('span');
      fileSize.className = 'file-size-text';
      fileSize.textContent = formatBytes(file.size);

      fileMeta.appendChild(fileName);
      fileMeta.appendChild(fileSize);
      fileInfo.appendChild(fileMeta);

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn-remove-file';
      removeBtn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
      `;
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeFile(index);
      });

      fileItem.appendChild(fileInfo);
      fileItem.appendChild(removeBtn);
      fileList.appendChild(fileItem);
    });
  }

  // Clear files when form is successfully submitted (using HTMX events)
  document.body.addEventListener('htmx:afterRequest', (e) => {
    // If the request succeeded and resulted in _success.html being rendered
    if (e.detail.successful && e.detail.target.id === 'result' && e.detail.xhr.status === 200) {
      selectedFiles = [];
      updateFileInput();
      renderFileList();
    }
  });

</script>

<style>
  #expense-form.htmx-request { opacity: 0.6; pointer-events: none; }
  #expense-form.htmx-request .actions button { display: none; }
</style>
{% endblock %}
