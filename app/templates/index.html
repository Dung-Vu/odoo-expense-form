{% extends "base.html" %}
{% block content %}
<form id="expense-form"
      hx-post="/submit"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      enctype="multipart/form-data">

  <div class="grid">

    <label class="full">
      <span>Company <em>*</em></span>
      <select name="company_id" required>
        <option value="">-- Select company --</option>
        {% for c in dropdowns.companies %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Employee <em>*</em></span>
      <select name="employee_id" id="employee-id" required>
        <option value="">-- Select employee --</option>
        {% for e in dropdowns.employees %}
          <option value="{{ e.id }}" data-company-id="{{ e.company_id[0] if e.company_id else '' }}">
            {{ e.name }}{% if e.company_id %} ({{ e.company_id[1] }}){% endif %}
          </option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Category <em>*</em></span>
      <select name="product_id" required>
        <option value="">-- Select category --</option>
        {% for p in dropdowns.categories %}
          <option value="{{ p.id }}">
            {{ p.default_code or '—' }} · {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </label>

    <label>
      <span>Date <em>*</em></span>
      <input type="date" name="date" required value="{{ today }}">
    </label>

    {% if dropdowns.currencies|length > 1 %}
      <label>
        <span>Currency <em>*</em></span>
        <select name="currency_id" required>
          {% for cur in dropdowns.currencies %}
            <option value="{{ cur.id }}">{{ cur.name }} ({{ cur.symbol }})</option>
          {% endfor %}
        </select>
      </label>
    {% else %}
      <div class="placeholder-cell"></div>
    {% endif %}

    <label class="full">
      <span>
        Amount <em>*</em>
        {% if dropdowns.currencies|length == 1 %}
          <small class="currency-suffix-inline">({{ dropdowns.currencies[0].name }} {{ dropdowns.currencies[0].symbol }})</small>
        {% endif %}
      </span>
      <input type="number" name="total_amount" step="0.01" min="0.01" required placeholder="0.00">
    </label>

    {% if dropdowns.currencies|length == 1 %}
      <input type="hidden" name="currency_id" value="{{ dropdowns.currencies[0].id }}">
    {% endif %}

    <label class="full">
      <span>Paid by <em>*</em></span>
      <select name="payment_mode" id="payment-mode" required>
        <option value="own_account" selected>Employee (to reimburse)</option>
        <option value="company_account">Company</option>
      </select>
    </label>

    <label class="full" id="vendor-wrap" style="display: none;">
      <span>Vendor <em>*</em> <small>(required when paid by Company)</small></span>
      <select name="vendor_id" id="vendor-id">
        <option value="">-- Select vendor --</option>
        {% for v in dropdowns.vendors %}
          <option value="{{ v.id }}" data-company-id="{{ v.company_id[0] if v.company_id else '' }}">{{ v.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Description (internal notes)</span>
      <textarea name="description" rows="2" placeholder="e.g. Phí ship Lalamove đơn #XYZ"></textarea>
    </label>

    <label class="full">
      <span>Receipt <small>(PDF / image, max 16MB)</small></span>
      <input type="file" name="receipt" accept="image/*,application/pdf">
    </label>

  </div>

  <div class="actions">
    <button type="submit" class="primary">Submit Expense</button>
    <span class="htmx-indicator" id="loading">Submitting...</span>
  </div>
</form>

<div id="result"></div>

<script>
  // Show vendor field only when payment_mode = company_account
  const pm = document.getElementById('payment-mode');
  const vw = document.getElementById('vendor-wrap');
  const vi = document.getElementById('vendor-id');
  function syncVendor() {
    if (pm.value === 'company_account') {
      vw.style.display = '';
      vi.required = true;
    } else {
      vw.style.display = 'none';
      vi.required = false;
      vi.value = '';
    }
  }
  pm.addEventListener('change', syncVendor);
  syncVendor();

  // Dynamically filter Employee and Vendor options based on the selected Company
  const companySelect = document.querySelector('select[name="company_id"]');
  const employeeSelect = document.getElementById('employee-id');
  const vendorSelect = document.getElementById('vendor-id');

  const employeePlaceholder = employeeSelect.options[0].cloneNode(true);
  const vendorPlaceholder = vendorSelect.options[0].cloneNode(true);

  // Keep master copies of the options (skipping placeholder)
  const masterEmployees = Array.from(employeeSelect.options).slice(1);
  const masterVendors = Array.from(vendorSelect.options).slice(1);

  function filterSelect(selectEl, placeholder, masterOptions, selectedCompanyId) {
    const currentValue = selectEl.value;
    selectEl.innerHTML = '';
    selectEl.appendChild(placeholder.cloneNode(true));

    let hasCurrentValue = false;
    masterOptions.forEach(opt => {
      const optCompanyId = opt.getAttribute('data-company-id');
      // Show if no company is selected, or if the option is shared, or if it matches the selected company
      if (!selectedCompanyId || !optCompanyId || optCompanyId === selectedCompanyId) {
        const cloned = opt.cloneNode(true);
        selectEl.appendChild(cloned);
        if (cloned.value === currentValue) {
          hasCurrentValue = true;
        }
      }
    });

    if (hasCurrentValue) {
      selectEl.value = currentValue;
    } else {
      selectEl.value = '';
    }
  }

  function syncCompanyFilters() {
    const selectedCompanyId = companySelect.value;
    filterSelect(employeeSelect, employeePlaceholder, masterEmployees, selectedCompanyId);
    filterSelect(vendorSelect, vendorPlaceholder, masterVendors, selectedCompanyId);
  }

  companySelect.addEventListener('change', syncCompanyFilters);
  syncCompanyFilters();

</script>

<style>
  #expense-form.htmx-request { opacity: 0.6; pointer-events: none; }
  #expense-form.htmx-request .actions button { display: none; }
</style>
{% endblock %}
