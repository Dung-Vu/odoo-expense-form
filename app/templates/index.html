{% extends "base.html" %}
{% block content %}
<form id="expense-form"
      hx-post="/submit"
      hx-target="#result"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      enctype="multipart/form-data">

  <div class="grid">

    <label class="full">
      <span>Công ty <em>*</em></span>
      <select name="company_id" required>
        <option value="">-- Chọn công ty --</option>
        {% for c in dropdowns.companies %}
          <option value="{{ c.id }}">{{ c.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Nhân viên <em>*</em></span>
      <select name="employee_id" required>
        <option value="">-- Chọn nhân viên --</option>
        {% for e in dropdowns.employees %}
          <option value="{{ e.id }}">
            {{ e.name }}{% if e.company_id %} ({{ e.company_id[1] }}){% endif %}
          </option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Hạng mục <em>*</em></span>
      <select name="product_id" required>
        <option value="">-- Chọn hạng mục --</option>
        {% for p in dropdowns.categories %}
          <option value="{{ p.id }}">
            {{ p.default_code or '—' }} · {{ p.name }}
          </option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Ngày <em>*</em></span>
      <input type="date" name="date" required value="{{ today }}">
    </label>

    {% if dropdowns.currencies|length > 1 %}
      <label>
        <span>Tiền tệ <em>*</em></span>
        <select name="currency_id" required>
          {% for cur in dropdowns.currencies %}
            <option value="{{ cur.id }}">{{ cur.name }} ({{ cur.symbol }})</option>
          {% endfor %}
        </select>
      </label>
    {% else %}
      <div class="placeholder-cell"></div>
    {% endif %}

    <label class="full">
      <span>
        Số tiền <em>*</em>
        {% if dropdowns.currencies|length == 1 %}
          <small class="currency-suffix-inline">({{ dropdowns.currencies[0].name }} {{ dropdowns.currencies[0].symbol }})</small>
        {% endif %}
      </span>
      <input type="number" name="total_amount" step="0.01" min="0.01" required placeholder="0">
    </label>

    <label class="full">
      <span>Người chi trả <em>*</em></span>
      <select name="payment_mode" id="payment-mode" required>
        <option value="own_account" selected>Nhân viên (công ty sẽ hoàn lại)</option>
        <option value="company_account">Công ty chi trả</option>
      </select>
    </label>

    <label class="full" id="vendor-wrap" style="display: none;">
      <span>Nhà cung cấp <em>*</em> <small>(bắt buộc khi Công ty chi trả)</small></span>
      <select name="vendor_id" id="vendor-id">
        <option value="">-- Chọn nhà cung cấp --</option>
        {% for v in dropdowns.vendors %}
          <option value="{{ v.id }}">{{ v.name }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="full">
      <span>Ghi chú <small>(nội bộ)</small></span>
      <textarea name="description" rows="2" placeholder="vd: Phí ship Lalamove đơn #XYZ"></textarea>
    </label>

    <label class="full file-label">
      <span>Hóa đơn <small>(PDF / ảnh, tối đa 16MB)</small></span>
      <input type="file" name="receipt" accept="image/*,application/pdf" id="receipt-input">
      <span class="file-name" id="file-name">Chưa chọn file</span>
    </label>

  </div>

  <div class="actions">
    <button type="submit" class="primary">Gửi chi phí</button>
    <span class="htmx-indicator" id="loading">Đang gửi...</span>
  </div>
</form>

<div id="result"></div>

<script>
  // Show vendor field only when payment_mode = company_account
  const pm = document.getElementById('payment-mode');
  const vw = document.getElementById('vendor-wrap');
  const vi = document.getElementById('vendor-id');
  function syncVendor() {
    if (pm.value === 'company_account') {
      vw.style.display = '';
      vi.required = true;
    } else {
      vw.style.display = 'none';
      vi.required = false;
      vi.value = '';
    }
  }
  pm.addEventListener('change', syncVendor);
  syncVendor();

  // Show selected file name
  const fi = document.getElementById('receipt-input');
  const fn = document.getElementById('file-name');
  fi.addEventListener('change', () => {
    fn.textContent = fi.files[0] ? fi.files[0].name : 'Chưa chọn file';
  });
</script>

<style>
  #expense-form.htmx-request { opacity: 0.6; pointer-events: none; }
  #expense-form.htmx-request .actions button { display: none; }
</style>
{% endblock %}
